version: 2
project_name: workflow-plugin-openlms
builds:
  - id: plugin
    main: ./cmd/workflow-plugin-openlms
    binary: workflow-plugin-openlms
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: ["-s", "-w"]
archives:
  - id: plugin
    builds: [plugin]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format: tar.gz
checksum:
  name_template: checksums.txt
release:
  github:
    owner: GoCodeAlone
    name: workflow-plugin-openlms
